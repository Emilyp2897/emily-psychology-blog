
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.scene {
  width: 100%;
  min-height: 540px;
  background: #060d07;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  overflow: hidden;
}
.stage {
  position: relative;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fb {
  position: absolute;
  width: 210px;
  height: 210px;
  animation: fbSpin 1.5s cubic-bezier(.15,.8,.35,1) forwards,
             fbFade 0.3s ease-in 1.75s forwards;
}
.sh {
  position: absolute;
  width: 210px;
  height: 210px;
  opacity: 0;
  animation: shIn 0.6s cubic-bezier(.25,1.4,.5,1) 2.0s forwards;
}
.wordmark {
  opacity: 0;
  margin-top: 1rem;
  animation: fadeUp 0.6s ease-out 2.65s forwards;
}
.wm-mind {
  font-family: Georgia, serif;
  font-size: 2.8rem;
  font-weight: 900;
  color: #f0cdff;
  letter-spacing: -1px;
  line-height: 1;
  display: block;
  text-align: center;
  -webkit-text-stroke: 1.5px #69005a;
}
.wm-row {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 0.4rem;
  margin-top: 0.1rem;
}
.wm-the {
  font-family: Georgia, serif;
  font-size: 1.15rem;
  color: #f0cdff;
}
.wm-gael {
  font-family: Georgia, serif;
  font-size: 2.8rem;
  font-weight: 900;
  color: #69005a;
  line-height: 1;
  -webkit-text-stroke: 1px #2c0a71;
}
.scroll-hint {
  opacity: 0;
  margin-top: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.45rem;
  animation: fadeUp 0.5s ease-out 3.3s forwards;
}
.scroll-hint span {
  font-size: 0.68rem;
  color: #c1ff72;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.chevron {
  width: 14px;
  height: 14px;
  border-right: 2px solid #c1ff72;
  border-bottom: 2px solid #c1ff72;
  transform: rotate(45deg);
  animation: bounce 1.2s ease-in-out 3.8s infinite;
}
.replay-btn {
  opacity: 0;
  margin-top: 1.4rem;
  animation: fadeUp 0.4s ease-out 3.5s forwards;
  background: transparent;
  border: 1px solid #c1ff72;
  color: #c1ff72;
  padding: 0.3rem 0.9rem;
  border-radius: 6px;
  font-size: 0.72rem;
  cursor: pointer;
  letter-spacing: 0.07em;
}
.replay-btn:hover { background: rgba(193,255,114,0.08); }
@keyframes fbSpin {
  0%   { transform: scale(0.15) rotate(0deg); opacity: 0; }
  12%  { opacity: 1; }
  78%  { transform: scale(1.07) rotate(350deg); }
  100% { transform: scale(1) rotate(360deg); }
}
@keyframes fbFade {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.3); }
}
@keyframes shIn {
  0%   { opacity: 0; transform: scale(0.35) rotate(-20deg); }
  62%  { transform: scale(1.12) rotate(6deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
@keyframes fadeUp {
  0%   { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%,100% { transform: rotate(45deg) translateY(0); }
  50%      { transform: rotate(45deg) translateY(6px); }
}
</style>

<script>
function replay() {
  const anims = [
    ['.fb', 'fbSpin 1.5s cubic-bezier(.15,.8,.35,1) forwards, fbFade 0.3s ease-in 1.75s forwards'],
    ['.sh', 'shIn 0.6s cubic-bezier(.25,1.4,.5,1) 2.0s forwards'],
    ['.wordmark', 'fadeUp 0.6s ease-out 2.65s forwards'],
    ['.scroll-hint', 'fadeUp 0.5s ease-out 3.3s forwards'],
    ['.replay-btn', 'fadeUp 0.4s ease-out 3.5s forwards'],
  ];
  anims.forEach(([sel, anim]) => {
    const el = document.querySelector(sel);
    if (!el) return;
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = anim;
  });
}
</script>
